[phases.setup]
nixPkgs = ["python311Full"]

[phases.install]
cmds = [
  "python3 -m venv /app/.venv",
  "/app/.venv/bin/pip install --upgrade pip",
  "/app/.venv/bin/pip install -r requirements.txt"
]

[start]
cmd = "sh -c '/app/.venv/bin/python main.py & /app/.venv/bin/python -m uvicorn config_app:app --host 0.0.0.0 --port ${PORT:-8000}'"
