<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ brand }} • Helldivers II Major Order</title>
  <meta name="theme-color" content="{{ accent }}">
  <style>
    :root {
      --accent: {{ accent }};
      --bg: #03040b;
      --panel: rgba(10, 12, 18, 0.9);
      --muted: #9aa4b5;
      --text: #eaf1ff;
      --border: rgba(255, 255, 255, 0.08);
      --glow: rgba(250, 201, 92, 0.35);
      --danger: #ff7b7b;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1100px 520px at 14% 8%, rgba(122, 153, 255, 0.12), transparent 55%),
        radial-gradient(1000px 540px at 88% 4%, rgba(255, 220, 120, 0.08), transparent 60%),
        var(--bg);
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }
    .page {
      width: min(900px, 100%);
      margin: 0 auto;
      padding: 36px 20px 64px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
      z-index: 1;
    }
    .page::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(14, 19, 30, 0.82), rgba(14, 19, 30, 0.55));
      backdrop-filter: blur(7px);
      z-index: -1;
    }
    .masthead {
      padding: 22px 22px 18px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }
    .identity {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: center;
    }
    .brand-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #0a0c12;
      background: linear-gradient(160deg, #ffd74f, color-mix(in oklab, var(--accent) 75%, #f8d047 25%));
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }
    .title-block h1 {
      margin: 0 0 6px;
      font-size: clamp(26px, 5vw, 36px);
      font-weight: 800;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .title-block p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      max-width: 680px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255, 215, 79, 0.16);
      border: 1px solid rgba(255, 215, 79, 0.35);
      color: #ffe9a3;
      font-size: 12px;
      letter-spacing: 0.3px;
    }
    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 12px;
      padding: 10px 16px;
      font-weight: 700;
      border: 1px solid color-mix(in oklab, var(--accent) 65%, black 35%);
      background: linear-gradient(180deg, color-mix(in oklab, var(--accent) 82%, #2c240f 18%), #0c0d12);
      color: #0a0b10;
      cursor: pointer;
      text-decoration: none;
      transition: transform .15s ease, filter .15s ease, opacity .2s ease;
      box-shadow: 0 10px 20px rgba(0,0,0,.25), 0 0 0 1px rgba(255,255,255,0.06) inset;
    }
    .btn:hover { filter: brightness(1.05); transform: translateY(-1px); }
    .btn:disabled { opacity: .6; cursor: not-allowed; transform: none; filter: none; }
    .status-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      font-size: 14px;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--muted);
      box-shadow: 0 0 12px rgba(255,255,255,0.25);
    }
    .dot--success { background: #39e19f; box-shadow: 0 0 12px rgba(57,225,159,0.6); }
    .dot--warn { background: #f4c152; box-shadow: 0 0 12px rgba(244,193,82,0.6); }
    .dot--error { background: #ff7b7b; box-shadow: 0 0 12px rgba(255,123,123,0.6); }
    .dot--info { background: #71a5ff; box-shadow: 0 0 12px rgba(113,165,255,0.55); }
    .card {
      background: var(--panel);
      border-radius: 18px;
      border: 1px solid var(--border);
      padding: 20px;
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      display: grid;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(130deg, rgba(255, 215, 79, 0.06), transparent 55%);
    }
    .card__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .card__header h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0.4px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .major-body { display: grid; gap: 10px; position: relative; z-index: 1; }
    .order-title { font-size: 20px; font-weight: 800; margin: 0; letter-spacing: 0.3px; }
    .order-desc { margin: 0; color: var(--muted); line-height: 1.5; }
    .targets { display: flex; flex-wrap: wrap; gap: 8px; }
    .target-pill { background: rgba(255, 215, 79, 0.08); border: 1px solid rgba(255, 215, 79, 0.35); color: #ffe7a1; }
    .progress {
      height: 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      position: relative;
    }
    .progress span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #f7d05a, var(--accent));
      box-shadow: 0 0 16px var(--glow);
    }
    .meta-row { display: flex; flex-wrap: wrap; gap: 8px; color: var(--muted); font-size: 13px; }
    .timestamp { color: var(--muted); font-size: 13px; }
    .footer {
      margin-top: auto;
      padding: 18px 24px 28px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
      background: rgba(5,7,15,.6);
      border-top: 1px solid rgba(255,255,255,.05);
    }
    .footer a { color: inherit; text-decoration: none; }
    .footer a:hover { color: color-mix(in oklab, var(--accent) 80%, white 20%); }
    @media (max-width: 720px) { .masthead { grid-template-columns: 1fr; } .card__header { flex-direction: column; align-items: flex-start; } }
  </style>
</head>
<body>
  <div class="page">
    <header class="masthead">
      <div class="identity">
        <div class="brand-icon">{{ brand_initials }}</div>
        <div class="title-block">
          <div class="badge">Super Earth Strategic Uplink</div>
          <h1>Helldivers II Major Order</h1>
          <p>Single-signal broadcast of the current major order. Wider war intel will return after this uplink stabilises.</p>
        </div>
      </div>
      <div class="actions">
        <div class="status-card" id="statusBanner" hidden>
          <span class="dot" id="statusDot"></span>
          <span id="statusText"></span>
        </div>
        <button class="btn" type="button" id="refreshBtn">Refresh Intel</button>
      </div>
    </header>

    <section class="card" id="majorSection" hidden>
      <div class="card__header">
        <div>
          <h2>Major Order</h2>
          <div class="timestamp" id="updatedAt" hidden></div>
        </div>
        <div class="pill" id="majorLabel">Awaiting orders</div>
      </div>
      <div class="major-body" id="majorOrder"></div>
    </section>
  </div>
  <footer class="footer">
    <span>Powered by {{ brand }} • build {{ build }}</span>
    <a href="/">Return to Spectre</a>
  </footer>
  <script>
    const refreshBtn = document.getElementById('refreshBtn');
    const statusBanner = document.getElementById('statusBanner');
    const statusText = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');
    const updatedAtEl = document.getElementById('updatedAt');
    const majorSectionEl = document.getElementById('majorSection');
    const majorEl = document.getElementById('majorOrder');
    const majorLabelEl = document.getElementById('majorLabel');

    let loading = false;
    let autoRefreshTimer = null;

    const initialSummary = {{ summary | tojson | safe }};
    const initialError = {{ summary_error | tojson | safe }};

    function setStatus(message, tone = 'info') {
      if (!statusBanner || !statusText || !statusDot) return;
      if (!message) {
        statusBanner.hidden = true;
        statusText.textContent = '';
        return;
      }
      statusBanner.hidden = false;
      statusText.textContent = message;
      const toneClass = {
        success: 'dot--success',
        warn: 'dot--warn',
        error: 'dot--error',
        info: 'dot--info',
      }[tone] || 'dot--info';
      statusDot.className = `dot ${toneClass}`;
    }

    function setLoading(state) {
      loading = Boolean(state);
      if (refreshBtn) {
        refreshBtn.disabled = loading;
        refreshBtn.textContent = loading ? 'Syncing…' : 'Refresh Intel';
      }
      document.body.classList.toggle('loading', loading);
    }

    function clearMajorOrder() {
      if (majorSectionEl) majorSectionEl.hidden = true;
      if (majorEl) majorEl.innerHTML = '';
      if (majorLabelEl) majorLabelEl.textContent = 'Awaiting orders';
      if (updatedAtEl) {
        updatedAtEl.hidden = true;
        updatedAtEl.textContent = '';
      }
    }

    function formatDuration(seconds) {
      if (typeof seconds !== 'number' || !Number.isFinite(seconds) || seconds <= 0) {
        return null;
      }
      const total = Math.round(seconds);
      const days = Math.floor(total / 86400);
      const hours = Math.floor((total % 86400) / 3600);
      const minutes = Math.floor((total % 3600) / 60);
      const parts = [];
      if (days) parts.push(`${days}d`);
      if (hours) parts.push(`${hours}h`);
      if (minutes && parts.length < 2) parts.push(`${minutes}m`);
      if (!parts.length) parts.push('<1m');
      return parts.join(' ');
    }

    function formatTimestamp(seconds) {
      if (!seconds) return null;
      const date = new Date(seconds * 1000);
      if (!Number.isFinite(date.getTime())) return null;
      return date.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
    }

    function renderMajorOrder(order) {
      if (!majorEl) return;
      majorEl.innerHTML = '';
      if (!order || typeof order !== 'object') {
        const empty = document.createElement('div');
        empty.className = 'order-desc';
        empty.textContent = 'No major order active.';
        majorEl.appendChild(empty);
        if (majorLabelEl) majorLabelEl.textContent = 'Standby';
        return;
      }

      if (majorLabelEl) majorLabelEl.textContent = order.status || 'Active';

      if (order.title) {
        const title = document.createElement('h3');
        title.className = 'order-title';
        title.textContent = order.title;
        majorEl.appendChild(title);
      }

      if (order.description) {
        const description = document.createElement('p');
        description.className = 'order-desc';
        description.textContent = order.description;
        majorEl.appendChild(description);
      }

      if (Array.isArray(order.targets) && order.targets.length) {
        const targets = document.createElement('div');
        targets.className = 'targets';
        order.targets.forEach(target => {
          if (!target) return;
          const pill = document.createElement('span');
          pill.className = 'pill target-pill';
          pill.textContent = target;
          targets.appendChild(pill);
        });
        majorEl.appendChild(targets);
      }

      if (typeof order.progress === 'number') {
        const bar = document.createElement('div');
        bar.className = 'progress';
        const fill = document.createElement('span');
        fill.style.width = `${Math.max(0, Math.min(100, order.progress))}%`;
        bar.appendChild(fill);
        majorEl.appendChild(bar);
      }

      const meta = document.createElement('div');
      meta.className = 'meta-row';
      if (typeof order.progress === 'number') {
        const span = document.createElement('span');
        span.textContent = `Progress ${Math.round(order.progress)}%`;
        meta.appendChild(span);
      }
      if (typeof order.current === 'number' && typeof order.target === 'number' && order.target > 0) {
        const span = document.createElement('span');
        span.textContent = `${Math.round(order.current).toLocaleString()} / ${Math.round(order.target).toLocaleString()}`;
        meta.appendChild(span);
      }
      if (typeof order.time_remaining === 'number') {
        const remaining = formatDuration(order.time_remaining);
        if (remaining) {
          const span = document.createElement('span');
          span.textContent = `${remaining} remaining`;
          meta.appendChild(span);
        }
      }
      if (meta.children.length) {
        majorEl.appendChild(meta);
      }
    }

    function renderSummary(summary) {
      clearMajorOrder();
      if (!summary || typeof summary !== 'object' || !Object.keys(summary).length) {
        setStatus('No data available from the Helldivers feed.', 'warn');
        return;
      }
      if (majorSectionEl) {
        majorSectionEl.hidden = false;
      }
      renderMajorOrder(summary.major_order);
      if (updatedAtEl) {
        const updated = formatTimestamp(summary.updated_at);
        if (updated) {
          updatedAtEl.textContent = `Intel updated ${updated}`;
          updatedAtEl.hidden = false;
        }
      }
    }

    function scheduleAutoRefresh() {
      if (autoRefreshTimer) {
        clearTimeout(autoRefreshTimer);
      }
      autoRefreshTimer = setTimeout(() => {
        refreshIntel({ silent: true }).catch(() => {});
      }, 300000);
    }

    async function refreshIntel({ silent = false } = {}) {
      if (loading) return;
      if (!silent) {
        setStatus('Synchronising Galactic War intel…', 'info');
      }
      setLoading(true);
      try {
        const resp = await fetch('/helldivers/summary', {
          headers: { 'Accept': 'application/json' },
          cache: 'no-store',
        });
        if (!resp.ok) {
          const text = await resp.text().catch(() => '');
          throw new Error(text || `Helldivers feed unavailable (${resp.status})`);
        }
        const data = await resp.json();
        if (!data || !Object.keys(data).length) {
          clearMajorOrder();
          setStatus('No data available from the Helldivers feed.', 'warn');
          return;
        }
        renderSummary(data);
        setStatus('Galactic War intel synchronised.', 'success');
      } catch (error) {
        console.error(error);
        clearMajorOrder();
        const message = (error && error.message) ? error.message : 'Galactic War feed temporarily unavailable. Retry shortly.';
        setStatus(message, 'warn');
      } finally {
        setLoading(false);
        scheduleAutoRefresh();
      }
    }

    if (refreshBtn) {
      refreshBtn.addEventListener('click', () => {
        refreshIntel({ silent: false }).catch(() => {});
      });
    }

    (function init() {
      if (initialError) {
        clearMajorOrder();
        setStatus(initialError, 'warn');
        scheduleAutoRefresh();
      } else if (initialSummary && Object.keys(initialSummary).length) {
        renderSummary(initialSummary);
        setStatus('Galactic War intel synchronised.', 'success');
        scheduleAutoRefresh();
      } else {
        setStatus('Awaiting transmissions from Super Earth…', 'info');
        refreshIntel({ silent: true }).catch(() => {});
      }
    })();
  </script>
</body>
</html>
