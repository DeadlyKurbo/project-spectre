<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ brand or 'Spectre' }} • Pyro War Theatre</title>
  <style>
    :root {
      color-scheme: dark;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #010409;
      color: #f0f4ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 24px clamp(20px, 6vw, 60px);
      background: rgba(2, 10, 20, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    header h1 {
      margin: 0;
      font-size: clamp(20px, 4vw, 32px);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffb26d;
    }
    header p {
      margin: 6px 0 0;
      color: rgba(240, 244, 255, 0.75);
      font-size: 15px;
    }
    main {
      flex: 1;
      display: flex;
    }
    #war-map {
      width: 100%;
      height: 100vh;
      background-image: url('/images/pyro-map.svg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.75);
    }
    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      font-size: 14px;
      color: rgba(240, 244, 255, 0.85);
    }
    .nav-link span {
      font-size: 18px;
      line-height: 1;
    }
    .nav-link:hover { color: #ffffff; }
  </style>
</head>
<body>
  <header>
    <a class="nav-link" href="/">
      <span>←</span>
      Back to Command
    </a>
    <h1>Pyro War Theatre</h1>
    <p>Static tactical reference pulled from the latest Pyro/Stanton overlays.</p>
  </header>
  <main>
    <div id="war-map" role="img" aria-label="Pyro tactical map"></div>
  </main>
</body>
</html>
