<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SPECTRE // Operational Intelligence Network</title>
    <link rel="stylesheet" href="/static/landing_hud.css">
  </head>
  <body>
    <main>
      <section class="fleet-hero">
        <div class="fleet-grid">
          <div class="fleet-left">
            <h1>
              SPECTRE
              <span>Operational Intelligence Network</span>
            </h1>

            <p>
              Federated command, clearance-controlled intelligence, and automated
              security enforcement across your entire Discord infrastructure.
            </p>

            <div class="fleet-actions">
              <a href="/dashboard" class="btn-primary">Enter Operations</a>
              <a href="/docs" class="btn-secondary">View Documentation</a>
            </div>
          </div>

          <div class="fleet-right">
            <div class="hud-frame">
              <div class="hud-line"></div>
              <div class="hud-content">
                <p class="hud-title">LIVE NETWORK</p>
                <p>Servers online: <strong>Auto</strong></p>
                <p>Clearance tiers: <strong>Active</strong></p>
                <p>Security state: <span class="good">SECURE</span></p>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
