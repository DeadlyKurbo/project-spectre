<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ brand }} • Helldivers II Intel</title>
  <meta name="theme-color" content="{{ accent }}">
  <script src="/static/onboarding.js" defer></script>
  <style>
    {% include "_grid.css" %}
    :root {
      --accent: {{ accent }};
      --bg: #05070f;
      --panel: rgba(14, 20, 34, 0.9);
      --muted: #9aa4b5;
      --text: #e6ebff;
      --warning: #ff4b4b;
      --grid-opacity: 0.2;
      --grid-size: 28px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, sans-serif;
      color: var(--text);
      background:
        radial-gradient(800px 520px at 20% -10%, rgba(255, 75, 75, .12) 20%, transparent 70%),
        radial-gradient(820px 480px at 115% 10%, rgba(255, 75, 75, .14) 18%, transparent 70%),
        #05070f;
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }
    .page {
      width: min(720px, 100%);
      margin: 0 auto;
      padding: 80px 24px;
      display: grid;
      gap: 32px;
      text-align: center;
    }
    .brand-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      border-radius: 20px;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: color-mix(in oklab, var(--accent) 85%, white 15%);
      background: color-mix(in oklab, var(--accent) 18%, black 82%);
      border: 1px solid color-mix(in oklab, var(--accent) 58%, transparent);
      margin: 0 auto;
    }
    .brand-mark--image {
      padding: 0;
      overflow: hidden;
      background: rgba(255,255,255,.04);
    }
    .brand-mark--image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 20px;
    }
    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 54px);
      letter-spacing: .6px;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--warning);
      text-shadow: 0 8px 30px rgba(255,75,75,.35);
    }
    p {
      margin: 0;
      font-size: 16px;
      color: var(--muted);
      line-height: 1.6;
    }
    .panel {
      border-radius: 28px;
      padding: 32px 24px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 20px 48px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.06);
      display: grid;
      gap: 20px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 999px;
      padding: 12px 22px;
      font-weight: 600;
      border: 1px solid color-mix(in oklab, var(--accent) 55%, black 45%);
      background: color-mix(in oklab, var(--accent) 82%, black 15%);
      color: #05070c;
      cursor: pointer;
      text-decoration: none;
      transition: transform .15s ease, filter .15s ease;
    }
    .btn:hover { filter: brightness(1.05); transform: translateY(-1px); }
    .tagline {
      font-size: 14px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="brand-mark{% if brand_image_url %} brand-mark--image{% endif %}">
      {% if brand_image_url %}
        <img src="{{ brand_image_url }}" alt="{{ brand }} badge">
      {% else %}
        {{ brand_initials }}
      {% endif %}
    </div>
    <div class="panel">
      <div class="tagline">Helldivers II feed</div>
      <h1>Under Construction</h1>
      <p>
        The Helldivers II intel hub is getting extra polish and will return in a future update.
        Check back soon for the full galactic war briefing.
      </p>
      <a class="btn" href="/">← Back to landing</a>
    </div>
  </main>
</body>
</html>
