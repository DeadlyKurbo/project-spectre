<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ brand or 'Spectre' }} • Pyro War Status</title>
  <script src="/static/onboarding.js" defer></script>
  <style>
    :root {
      color-scheme: dark;
      --accent: {{ accent or '#ff5252' }};
      --bg: #05070f;
      --panel: rgba(9, 12, 20, 0.92);
      --muted: rgba(229, 231, 235, 0.78);
    }

    [data-tone="victory"] {
      --accent: #22c55e;
      --panel: rgba(5, 46, 22, 0.9);
      --muted: rgba(209, 250, 229, 0.9);
      background: radial-gradient(circle at 10% 10%, rgba(34, 197, 94, 0.18), transparent 45%),
                  radial-gradient(circle at 80% 0%, rgba(16, 185, 129, 0.18), transparent 35%),
                  #020609;
    }

    [data-tone="retreat"] {
      --accent: #ef4444;
      --panel: rgba(46, 10, 10, 0.92);
      --muted: rgba(254, 205, 211, 0.9);
      background: radial-gradient(circle at 10% 10%, rgba(248, 113, 113, 0.16), transparent 45%),
                  radial-gradient(circle at 80% 0%, rgba(153, 27, 27, 0.24), transparent 40%),
                  #040307;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;
      color: #f8fafc;
      background: radial-gradient(circle at 20% 20%, rgba(255, 135, 80, 0.16), transparent 60%),
                  radial-gradient(circle at 70% 0%, rgba(95, 136, 255, 0.12), transparent 50%),
                  var(--bg);
      background-attachment: fixed;
    }

    .wrap {
      width: min(720px, 100%);
      margin: 0 auto;
      padding: clamp(32px, 5vw, 64px) clamp(18px, 4vw, 28px) clamp(64px, 8vw, 96px);
      display: grid;
      gap: 18px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid color-mix(in oklab, var(--accent) 40%, black 60%);
      color: color-mix(in oklab, var(--accent) 70%, white 30%);
      background: color-mix(in oklab, var(--accent) 25%, transparent);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 12px;
      width: fit-content;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 5vw, 38px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: clamp(18px, 3vw, 26px);
      box-shadow: 0 18px 46px rgba(0, 0, 0, 0.38);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid color-mix(in oklab, var(--accent) 55%, black 45%);
      background: color-mix(in oklab, var(--accent) 82%, black 16%);
      color: #05070c;
      font-weight: 700;
      text-decoration: none;
      min-width: 160px;
      box-shadow: 0 12px 32px color-mix(in oklab, var(--accent) 35%, transparent);
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    .btn:hover { filter: brightness(1.05); transform: translateY(-1px); }

    .btn--ghost {
      background: transparent;
      color: #f8fafc;
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: none;
    }

    .muted-note {
      font-size: 13px;
      color: var(--muted);
      margin-top: 10px;
    }
  </style>
</head>
<body data-tone="{{ war_status }}">
  <div class="wrap">
    <div class="pill">Pyro War</div>
    <div class="panel">
      <h1>{{ outcome_title }}</h1>
      <p style="margin-top:10px; color:#f8fafc;">{{ outcome_message }}</p>
      <p class="muted-note">War map access is restricted to admins while this state is active.</p>
      <div class="actions" style="margin-top:18px;">
        <a class="btn" href="/">Return to landing</a>
        {% if is_admin_viewer %}
          <a class="btn btn--ghost" href="/operations/pyro-war">Admin: open war map</a>
          <a class="btn btn--ghost" href="/admin/war-manager">Manage war map</a>
        {% endif %}
      </div>
    </div>
  </div>
</body>
</html>
