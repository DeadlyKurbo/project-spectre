<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>W.A.S.P Tactical Map</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #020611;
    font-family: monospace;
}

#map-container {
    width: 100vw;
    height: 100vh;
}

#admin-panel {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 10;
    min-width: 250px;
    max-width: 320px;
    max-height: calc(100vh - 100px);
    overflow-y: auto;
    color: #d9ffff;
    background: rgba(2, 10, 24, 0.78);
    border: 1px solid #00ffff;
    border-radius: 10px;
    padding: 12px;
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.42);
    backdrop-filter: blur(8px);
    transition: transform 0.25s ease, width 0.25s ease, min-width 0.25s ease;
}

#admin-panel.collapsed {
    min-width: 48px;
    width: 48px;
    max-width: 48px;
    padding: 8px;
}

#admin-panel.collapsed #admin-panel-body {
    display: none !important;
}

#admin-panel-toggle {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 28px;
    height: 28px;
    padding: 0;
    border: 1px solid rgba(0, 255, 255, 0.5);
    border-radius: 6px;
    background: rgba(5, 19, 38, 0.92);
    color: #d9ffff;
    cursor: pointer;
    font-size: 0.9rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
}

#admin-panel-toggle:hover {
    background: rgba(0, 255, 255, 0.15);
}

#admin-panel.collapsed #admin-panel-toggle {
    position: static;
    margin: 0 auto;
    display: flex;
}

#map-fullscreen-btn {
    position: absolute;
    bottom: 20px;
    right: 20px;
    z-index: 10;
    width: 44px;
    height: 44px;
    padding: 0;
    border: 1px solid rgba(0, 255, 255, 0.5);
    border-radius: 10px;
    background: rgba(2, 10, 24, 0.78);
    backdrop-filter: blur(8px);
    color: #d9ffff;
    cursor: pointer;
    font-size: 1.2rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
}

#map-fullscreen-btn:hover {
    background: rgba(0, 255, 255, 0.15);
}

#admin-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
}

#admin-clock {
    color: #7fffd4;
    font-size: 0.9rem;
}

#admin-greeting {
    margin: 0 0 8px;
    color: #9ce7eb;
    font-size: 0.82rem;
}

#admin-panel-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
}

#admin-panel-status {
    border-top: 1px solid rgba(127, 255, 212, 0.25);
    padding-top: 10px;
    display: grid;
    gap: 4px;
    color: #bff9ff;
    font-size: 0.85rem;
}

#unit-panel {
    margin-top: 12px;
    border-top: 1px solid rgba(127, 255, 212, 0.25);
    padding-top: 12px;
    display: grid;
    gap: 8px;
}

#unit-panel h3 {
    margin: 0;
    color: #ffffff;
    font-size: 1rem;
}

#unit-panel label {
    font-size: 0.78rem;
    color: #9ce7eb;
    letter-spacing: 0.04em;
    text-transform: uppercase;
}

#unit-panel input,
#unit-panel select {
    width: 100%;
    box-sizing: border-box;
    border: 1px solid rgba(0, 255, 255, 0.5);
    border-radius: 6px;
    background: rgba(5, 19, 38, 0.92);
    color: #d9ffff;
    font-family: inherit;
    padding: 8px;
}

#unit-panel-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}

.status-value {
    color: #7fffd4;
}

#admin-panel button {
    border: 1px solid #00ffff;
    border-radius: 6px;
    background: linear-gradient(180deg, #021326, #041e35);
    color: #d9ffff;
    font-family: inherit;
    padding: 8px 10px;
    cursor: pointer;
}

#admin-panel button:hover {
    background: linear-gradient(180deg, #06203d, #083157);
}

#spawn-menu {
    position: absolute;
    display: none;
    background: #001018;
    border: 1px solid cyan;
    border-radius: 8px;
    padding: 10px;
    z-index: 100;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.45);
}

#spawn-menu button {
    display: block;
    width: 120px;
    margin: 3px 0;
    background: #000;
    color: cyan;
    border: 1px solid cyan;
    border-radius: 4px;
    padding: 6px 8px;
    font-family: inherit;
    cursor: pointer;
}

#spawn-menu button:hover {
    background: rgba(0, 255, 255, 0.12);
}

#wasp-map-audio-control {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border: 1px solid rgba(0, 255, 255, 0.5);
    border-radius: 10px;
    background: rgba(2, 10, 24, 0.78);
    backdrop-filter: blur(8px);
    color: #d9ffff;
    font-family: inherit;
}

#wasp-map-audio-control .audio-control__title {
    margin: 0;
    font-size: 0.7rem;
    color: #9ce7eb;
    letter-spacing: 0.06em;
}

#wasp-map-audio-control .audio-control__buttons {
    display: flex;
    gap: 4px;
}

#wasp-map-audio-control .audio-btn {
    width: 28px;
    height: 28px;
    padding: 0;
    border: 1px solid rgba(0, 255, 255, 0.5);
    border-radius: 6px;
    background: rgba(5, 19, 38, 0.92);
    color: #d9ffff;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
}

#wasp-map-audio-control .audio-btn:hover {
    background: rgba(0, 255, 255, 0.15);
}

#wasp-map-audio-control .audio-control__status {
    margin: 0;
    font-size: 0.72rem;
    color: #7fffd4;
}


</style>
</head>

<body>

<div id="admin-panel" aria-label="WASP admin console">
  <button type="button" id="admin-panel-toggle" aria-label="Collapse panel" title="Collapse panel">◀</button>
  <div id="admin-panel-body">
  <div id="admin-panel-header">
    <strong>WASP Control Console</strong>
    <span id="admin-clock" aria-live="polite">--:--:--</span>
  </div>
  <p id="admin-greeting" aria-live="polite">Welcome, {{ display_name or "Operator" }}.</p>
  <div id="admin-panel-actions">
    <button type="button" onclick="spawnEnemy()">Spawn Enemy</button>
    <button type="button" onclick="spawnFriendly()">Spawn Friendly</button>
    <button type="button" onclick="placeEnemyUnit()">Place Enemy</button>
    <button type="button" onclick="placeFriendlyUnit()">Place Friendly</button>
    <button type="button" onclick="enableMoveMode()">Move Selected</button>
    <button type="button" onclick="deleteSelectedUnit()">Delete Unit</button>
    <button type="button" onclick="clearInteractionMode()">Clear Mode</button>
  </div>
  <div id="admin-panel-status" aria-live="polite">
    <div>Selected: <span id="selected-unit" class="status-value">None</span></div>
    <div>Mode: <span id="interaction-mode" class="status-value">Select</span></div>
  </div>

  <div id="unit-panel">
    <h3 id="unit-name">No unit selected</h3>

    <label for="edit-name">Name</label>
    <input id="edit-name" type="text" autocomplete="off">

    <label for="edit-country">Country</label>
    <input id="edit-country" type="text" autocomplete="off">

    <label for="edit-type">Type</label>
    <select id="edit-type">
      <option value="aircraft">aircraft</option>
      <option value="tank">tank</option>
      <option value="infantry">infantry</option>
      <option value="missile">missile</option>
    </select>

    <div id="unit-panel-actions">
      <button type="button" onclick="updateUnit()">Update</button>
      <button type="button" onclick="deleteSelectedUnit()">Delete</button>
    </div>
  </div>
  </div>
</div>

<div id="spawn-menu" aria-label="Spawn unit menu">
  <button type="button" onclick="spawnUnitFromMenu('aircraft')">Aircraft</button>
  <button type="button" onclick="spawnUnitFromMenu('tank')">Tank</button>
  <button type="button" onclick="spawnUnitFromMenu('infantry')">Infantry</button>
  <button type="button" onclick="spawnUnitFromMenu('missile')">Missile</button>
</div>

<section id="wasp-map-audio-control" class="audio-control" aria-label="Mission audio controls">
  <audio id="wasp-map-audio" preload="metadata"></audio>
  <div>
    <p class="audio-control__title">Audio</p>
    <div class="audio-control__buttons" role="group" aria-label="Background audio controls">
      <button type="button" class="audio-btn" data-audio-control="decrease" aria-label="Decrease volume" title="Decrease volume">🔉</button>
      <button type="button" class="audio-btn" data-audio-control="previous" aria-label="Previous track" title="Previous track">⏮</button>
      <button type="button" class="audio-btn" data-audio-control="next" aria-label="Skip to next track" title="Skip to next track">⏭</button>
      <button type="button" class="audio-btn" data-audio-control="increase" aria-label="Increase volume" title="Increase volume">🔊</button>
    </div>
  </div>
  <p class="audio-control__status" id="wasp-map-audio-status" aria-live="polite">Standby</p>
</section>

<div id="map-container"></div>
<button type="button" id="map-fullscreen-btn" aria-label="Toggle fullscreen" title="Toggle fullscreen">⛶</button>

<script src="/static/js/wasp_audio.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>
<script>
window.WASP_MAP_BOOTSTRAP = {{ {"displayName": display_name, "waspMusicTracks": wasp_music_tracks}|tojson }};
</script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  const adminPanel = document.getElementById('admin-panel');
  const adminToggle = document.getElementById('admin-panel-toggle');
  if (adminPanel && adminToggle) {
    adminToggle.addEventListener('click', function() {
      adminPanel.classList.toggle('collapsed');
      adminToggle.setAttribute('aria-label', adminPanel.classList.contains('collapsed') ? 'Expand panel' : 'Collapse panel');
      adminToggle.title = adminPanel.classList.contains('collapsed') ? 'Expand panel' : 'Collapse panel';
      adminToggle.textContent = adminPanel.classList.contains('collapsed') ? '▶' : '◀';
    });
  }

  const fullscreenBtn = document.getElementById('map-fullscreen-btn');
  if (fullscreenBtn) {
    fullscreenBtn.addEventListener('click', function() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
        fullscreenBtn.textContent = '⛶';
        fullscreenBtn.title = 'Exit fullscreen';
      } else {
        document.exitFullscreen();
        fullscreenBtn.textContent = '⛶';
        fullscreenBtn.title = 'Toggle fullscreen';
      }
    });
    document.addEventListener('fullscreenchange', function() {
      fullscreenBtn.textContent = document.fullscreenElement ? '✕' : '⛶';
      fullscreenBtn.title = document.fullscreenElement ? 'Exit fullscreen' : 'Toggle fullscreen';
    });
  }

  const audioEl = document.getElementById('wasp-map-audio');
  const statusEl = document.getElementById('wasp-map-audio-status');
  const buttons = Array.from(document.querySelectorAll('#wasp-map-audio-control [data-audio-control]'));
  const waspMusicTracks = (window.WASP_MAP_BOOTSTRAP && window.WASP_MAP_BOOTSTRAP.waspMusicTracks) || [];

  if (audioEl && statusEl && typeof window.setupWaspAudioControls === 'function') {
    window.setupWaspAudioControls({
      tracks: waspMusicTracks,
      audioElement: audioEl,
      statusElement: statusEl,
      buttons: buttons,
      defaultVolume: 50,
      autoPlay: false,
    });
  } else if (statusEl && !waspMusicTracks.length) {
    statusEl.textContent = 'Music unavailable · Upload MP3 in Director panel';
  }
});
</script>
<script type="module" src="/static/js/wasp_engine.js"></script>

</body>
</html>
