<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>W.A.S.P Tactical Map</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #020611;
    font-family: monospace;
}

#map-container {
    width: 100vw;
    height: 100vh;
}

#admin-panel {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 10;
    min-width: 250px;
    color: #d9ffff;
    background: rgba(2, 10, 24, 0.78);
    border: 1px solid #00ffff;
    border-radius: 10px;
    padding: 12px;
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.42);
    backdrop-filter: blur(8px);
}

#admin-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
}

#admin-clock {
    color: #7fffd4;
    font-size: 0.9rem;
}

#admin-greeting {
    margin: 0 0 8px;
    color: #9ce7eb;
    font-size: 0.82rem;
}

#admin-panel-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
}

#admin-panel-status {
    border-top: 1px solid rgba(127, 255, 212, 0.25);
    padding-top: 10px;
    display: grid;
    gap: 4px;
    color: #bff9ff;
    font-size: 0.85rem;
}

#unit-panel {
    margin-top: 12px;
    border-top: 1px solid rgba(127, 255, 212, 0.25);
    padding-top: 12px;
    display: grid;
    gap: 8px;
}

#unit-panel h3 {
    margin: 0;
    color: #ffffff;
    font-size: 1rem;
}

#unit-panel label {
    font-size: 0.78rem;
    color: #9ce7eb;
    letter-spacing: 0.04em;
    text-transform: uppercase;
}

#unit-panel input,
#unit-panel select {
    width: 100%;
    box-sizing: border-box;
    border: 1px solid rgba(0, 255, 255, 0.5);
    border-radius: 6px;
    background: rgba(5, 19, 38, 0.92);
    color: #d9ffff;
    font-family: inherit;
    padding: 8px;
}

#unit-panel-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}

.status-value {
    color: #7fffd4;
}

#admin-panel button {
    border: 1px solid #00ffff;
    border-radius: 6px;
    background: linear-gradient(180deg, #021326, #041e35);
    color: #d9ffff;
    font-family: inherit;
    padding: 8px 10px;
    cursor: pointer;
}

#admin-panel button:hover {
    background: linear-gradient(180deg, #06203d, #083157);
}

#spawn-menu {
    position: absolute;
    display: none;
    background: #001018;
    border: 1px solid cyan;
    border-radius: 8px;
    padding: 10px;
    z-index: 100;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.45);
}

#spawn-menu button {
    display: block;
    width: 120px;
    margin: 3px 0;
    background: #000;
    color: cyan;
    border: 1px solid cyan;
    border-radius: 4px;
    padding: 6px 8px;
    font-family: inherit;
    cursor: pointer;
}

#spawn-menu button:hover {
    background: rgba(0, 255, 255, 0.12);
}

#music-panel {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 11;
    width: min(340px, calc(100vw - 40px));
    color: #d9ffff;
    background: rgba(2, 10, 24, 0.5);
    border: 1px solid rgba(0, 255, 255, 0.7);
    border-radius: 10px;
    padding: 12px;
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.38);
    backdrop-filter: blur(8px);
    display: grid;
    gap: 8px;
}

#music-panel h3 {
    margin: 0;
    font-size: 0.96rem;
}

#music-panel p {
    margin: 0;
    color: #9ce7eb;
    font-size: 0.78rem;
}

#music-panel label {
    font-size: 0.74rem;
    color: #9ce7eb;
    text-transform: uppercase;
    letter-spacing: 0.04em;
}

#music-panel input {
    width: 100%;
    box-sizing: border-box;
    border: 1px solid rgba(0, 255, 255, 0.5);
    border-radius: 6px;
    background: rgba(5, 19, 38, 0.92);
    color: #d9ffff;
    font-family: inherit;
    padding: 8px;
}

#music-controls {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
}

#music-controls button {
    border: 1px solid #00ffff;
    border-radius: 6px;
    background: linear-gradient(180deg, #021326, #041e35);
    color: #d9ffff;
    font-family: inherit;
    padding: 7px 9px;
    cursor: pointer;
}

#music-controls button:hover {
    background: linear-gradient(180deg, #06203d, #083157);
}

#music-volume-row {
    display: flex;
    align-items: center;
    gap: 8px;
}

#music-volume {
    accent-color: #00ffff;
    flex: 1;
}

#music-status {
    color: #7fffd4;
    font-size: 0.75rem;
    min-height: 1.1em;
}
</style>
</head>

<body>

<div id="admin-panel" aria-label="WASP admin console">
  <div id="admin-panel-header">
    <strong>WASP Control Console</strong>
    <span id="admin-clock" aria-live="polite">--:--:--</span>
  </div>
  <p id="admin-greeting" aria-live="polite">Welcome, Operator.</p>
  <div id="admin-panel-actions">
    <button type="button" onclick="spawnEnemy()">Spawn Enemy</button>
    <button type="button" onclick="spawnFriendly()">Spawn Friendly</button>
    <button type="button" onclick="placeEnemyUnit()">Place Enemy</button>
    <button type="button" onclick="placeFriendlyUnit()">Place Friendly</button>
    <button type="button" onclick="enableMoveMode()">Move Selected</button>
    <button type="button" onclick="deleteSelectedUnit()">Delete Unit</button>
    <button type="button" onclick="clearInteractionMode()">Clear Mode</button>
  </div>
  <div id="admin-panel-status" aria-live="polite">
    <div>Selected: <span id="selected-unit" class="status-value">None</span></div>
    <div>Mode: <span id="interaction-mode" class="status-value">Select</span></div>
  </div>

  <div id="unit-panel">
    <h3 id="unit-name">No unit selected</h3>

    <label for="edit-name">Name</label>
    <input id="edit-name" type="text" autocomplete="off">

    <label for="edit-country">Country</label>
    <input id="edit-country" type="text" autocomplete="off">

    <label for="edit-type">Type</label>
    <select id="edit-type">
      <option value="aircraft">aircraft</option>
      <option value="tank">tank</option>
      <option value="infantry">infantry</option>
      <option value="missile">missile</option>
    </select>

    <div id="unit-panel-actions">
      <button type="button" onclick="updateUnit()">Update</button>
      <button type="button" onclick="deleteSelectedUnit()">Delete</button>
    </div>
  </div>
</div>

<div id="spawn-menu" aria-label="Spawn unit menu">
  <button type="button" onclick="spawnUnitFromMenu('aircraft')">Aircraft</button>
  <button type="button" onclick="spawnUnitFromMenu('tank')">Tank</button>
  <button type="button" onclick="spawnUnitFromMenu('infantry')">Infantry</button>
  <button type="button" onclick="spawnUnitFromMenu('missile')">Missile</button>
</div>

<div id="map-container"></div>

<section id="music-panel" aria-label="WASP music control panel">
  <h3>Mission Music</h3>
  <p>Persistent soundtrack control for this tactical map.</p>
  <label for="music-source">Audio URL</label>
  <input id="music-source" type="url" placeholder="https://example.com/track.mp3" autocomplete="off">
  <div id="music-controls">
    <button id="music-load" type="button">Load</button>
    <button id="music-play" type="button">Play</button>
    <button id="music-pause" type="button">Pause</button>
  </div>
  <div id="music-volume-row">
    <label for="music-volume">Volume</label>
    <input id="music-volume" type="range" min="0" max="1" step="0.05" value="0.5">
  </div>
  <div id="music-status" aria-live="polite">Idle</div>
</section>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module" src="/static/js/wasp_engine.js"></script>

</body>
</html>
