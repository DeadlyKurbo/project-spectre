<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ brand }} • Message inbox</title>
  <meta name="theme-color" content="{{ accent }}">
  <link rel="stylesheet" href="/static/wasp_global_player.css?v=20260403b">
  <script src="/static/onboarding.js" defer></script>
  <style>
    {% include "_grid.css" %}
    {% include "_wallpaper.css" %}
    :root {
      --accent: {{ accent }};
      --bg: #050810;
      --muted: #94a3b8;
      --text: #e2e8f0;
      --border: rgba(99, 102, 241, .28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, sans-serif;
      color: var(--text);
      background: radial-gradient(1200px 680px at 10% -8%, rgba(59,130,246,.16) 15%, transparent 62%),
                  radial-gradient(900px 540px at 100% 0%, rgba(14,165,233,.18) 22%, transparent 70%),
                  var(--bg);
      background-attachment: fixed;
    }
    a { color: inherit; }
    .page {
      width: min(1040px, 100%);
      margin: 0 auto;
      padding: 28px 18px 64px;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
    }
    .topbar h1 {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    .topbar p { margin: 4px 0 0; color: var(--muted); font-size: .88rem; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 9px 14px;
      border-radius: 12px;
      border: 1px solid rgba(148,163,184,.35);
      background: rgba(15,23,42,.45);
      color: #f1f5f9;
      font-weight: 600;
      font-size: .85rem;
      text-decoration: none;
      cursor: pointer;
    }
    .btn--danger {
      border-color: rgba(248,113,113,.45);
      background: rgba(127,29,29,.35);
      color: #fecaca;
      font-size: .78rem;
      padding: 7px 12px;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(200px, 260px) 1fr;
      gap: 16px;
      min-height: 400px;
    }
    @media (max-width: 720px) {
      .layout { grid-template-columns: 1fr; }
    }
    .inbox {
      border: 1px solid rgba(148,163,184,.22);
      border-radius: 16px;
      background: rgba(2, 6, 23, .4);
      display: flex;
      flex-direction: column;
      max-height: 520px;
    }
    .inbox header {
      padding: 10px 12px;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #a5b4fc;
      border-bottom: 1px solid rgba(148,163,184,.18);
    }
    .inbox ul {
      list-style: none;
      margin: 0;
      padding: 6px;
      overflow-y: auto;
      flex: 1;
    }
    .inbox button {
      width: 100%;
      text-align: left;
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 4px;
      background: rgba(15,23,42,.35);
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }
    .inbox button:hover { border-color: rgba(99,102,241,.35); }
    .inbox button.is-active {
      border-color: color-mix(in oklab, var(--accent) 55%, transparent);
      background: color-mix(in oklab, var(--accent) 18%, rgba(15,23,42,.5) 82%);
    }
    .inbox .label { font-weight: 600; font-size: .88rem; display: block; }
    .inbox .meta { font-size: .72rem; color: var(--muted); margin-top: 4px; }
    .main {
      border: 1px solid rgba(148,163,184,.22);
      border-radius: 16px;
      background: rgba(2, 6, 23, .35);
      display: flex;
      flex-direction: column;
      min-height: 360px;
      overflow: hidden;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(148,163,184,.18);
      font-size: .85rem;
      color: var(--muted);
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 400px;
    }
    .bubble {
      max-width: min(100%, 52ch);
      padding: 10px 12px;
      border-radius: 14px;
      font-size: .88rem;
      line-height: 1.45;
      border: 1px solid rgba(148,163,184,.2);
    }
    .bubble--member { align-self: flex-end; background: color-mix(in oklab, var(--accent) 18%, rgba(15,23,42,.55) 82%); }
    .bubble--staff { align-self: flex-start; background: rgba(30,41,59,.75); }
    .bubble__meta { font-size: .7rem; color: var(--muted); margin-bottom: 5px; }
    .status { font-size: .8rem; color: var(--muted); min-height: 1.2em; padding: 0 12px; }
    .composer {
      display: flex;
      gap: 10px;
      padding: 12px;
      border-top: 1px solid rgba(148,163,184,.18);
      align-items: flex-end;
    }
    .composer textarea {
      flex: 1;
      min-height: 44px;
      border-radius: 12px;
      border: 1px solid rgba(148,163,184,.28);
      background: rgba(15,23,42,.55);
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
    }
    .empty { color: var(--muted); font-size: .88rem; padding: 16px; text-align: center; }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div>
        <h1>Message inbox</h1>
        <p>Member threads by admin contact. Delete removes history for everyone.</p>
      </div>
      <a class="btn" href="/admin-team">← Admin team</a>
    </header>

    <div class="layout">
      <aside class="inbox" aria-label="Threads">
        <header>Inbox</header>
        <ul id="inbox-list"></ul>
      </aside>
      <div class="main">
        <div class="toolbar">
          <span id="thread-label">Select a conversation</span>
          <button type="button" class="btn btn--danger" id="delete-thread" hidden>Delete thread</button>
        </div>
        <div class="messages" id="thread-messages" role="log" aria-live="polite"></div>
        <p class="status" id="thread-status"></p>
        <form class="composer" id="thread-form">
          <textarea id="thread-input" maxlength="4000" rows="2" placeholder="Reply…" required></textarea>
          <button class="btn" type="submit" id="thread-send">Send</button>
        </form>
      </div>
    </div>
  </main>

  <script src="/static/js/wasp_audio.js?v=20260403b"></script>
  <script src="/static/js/wasp_global_player.js?v=20260403b"></script>
  <script>
    (function () {
      if (typeof window.mountGlobalWaspPlayer !== "function") return;
      window.mountGlobalWaspPlayer({
        tracks: {{ wasp_music_tracks|default([], true)|tojson }},
      });
    }());
  </script>
  <script>
    (function () {
      const messagesEl = document.getElementById("thread-messages");
      const statusEl = document.getElementById("thread-status");
      const threadLabel = document.getElementById("thread-label");
      const inboxList = document.getElementById("inbox-list");
      const form = document.getElementById("thread-form");
      const input = document.getElementById("thread-input");
      const sendBtn = document.getElementById("thread-send");
      const deleteBtn = document.getElementById("delete-thread");
      if (!messagesEl || !inboxList || !form || !input || !sendBtn) return;

      let apiToken = null;
      const seenIds = new Set();
      let selectedMemberId = null;
      let selectedAdminId = null;
      let es = null;

      function formatTime(iso) {
        try {
          const d = new Date(iso);
          if (Number.isNaN(d.getTime())) return "";
          return d.toLocaleString([], { dateStyle: "short", timeStyle: "short" });
        } catch (_e) { return ""; }
      }

      function clearMessages() {
        seenIds.clear();
        messagesEl.innerHTML = "";
      }

      function appendBubble(msg) {
        if (!msg || !msg.id || seenIds.has(msg.id)) return;
        seenIds.add(msg.id);
        const wrap = document.createElement("div");
        const staff = Boolean(msg.isStaff);
        wrap.className = "bubble " + (staff ? "bubble--staff" : "bubble--member");
        const meta = document.createElement("div");
        meta.className = "bubble__meta";
        meta.textContent = (staff ? "Staff" : "Member") + " · " + (msg.senderLabel || "") + " · " + formatTime(msg.createdAt);
        const body = document.createElement("div");
        body.textContent = msg.body || "";
        wrap.appendChild(meta);
        wrap.appendChild(body);
        messagesEl.appendChild(wrap);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      async function ensureApiToken() {
        if (apiToken) return apiToken;
        const response = await fetch("/api/auth/token", { credentials: "same-origin" });
        if (!response.ok) throw new Error("token");
        const payload = await response.json();
        apiToken = payload && payload.token ? payload.token : null;
        if (!apiToken) throw new Error("token");
        return apiToken;
      }

      async function authHeaders() {
        const token = await ensureApiToken();
        return {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token,
        };
      }

      function adminClearUi() {
        selectedMemberId = null;
        selectedAdminId = null;
        clearMessages();
        threadLabel.textContent = "Select a conversation";
        deleteBtn.hidden = true;
        input.disabled = true;
        sendBtn.disabled = true;
        messagesEl.innerHTML = "<div class=\"empty\">Select a thread to read and reply.</div>";
      }

      async function loadInbox() {
        try {
          const res = await fetch("/api/support-chat/inbox", {
            credentials: "same-origin",
            headers: await authHeaders(),
          });
          if (!res.ok) throw new Error("inbox");
          const data = await res.json();
          const threads = Array.isArray(data.threads) ? data.threads : [];
          inboxList.innerHTML = "";
          if (!threads.length) {
            const li = document.createElement("li");
            li.className = "empty";
            li.textContent = "No conversations yet.";
            inboxList.appendChild(li);
            return;
          }
          threads.forEach((t) => {
            const li = document.createElement("li");
            const btn = document.createElement("button");
            btn.type = "button";
            if (
              selectedMemberId && selectedAdminId &&
              String(t.threadUserId) === String(selectedMemberId) &&
              String(t.targetAdminId) === String(selectedAdminId)
            ) {
              btn.classList.add("is-active");
            }
            const label = document.createElement("span");
            label.className = "label";
            label.textContent = t.userLabel || "Member";
            const meta = document.createElement("span");
            meta.className = "meta";
            meta.textContent = "→ admin " + (t.targetAdminId || "") + " · " + (t.preview || "").slice(0, 60);
            btn.appendChild(label);
            btn.appendChild(meta);
            btn.addEventListener("click", () => selectThread(String(t.threadUserId), String(t.targetAdminId)));
            li.appendChild(btn);
            inboxList.appendChild(li);
          });
        } catch (_e) {
          statusEl.textContent = "Could not refresh inbox.";
        }
      }

      async function selectThread(memberId, adminId) {
        selectedMemberId = memberId;
        selectedAdminId = adminId;
        statusEl.textContent = "";
        try {
          const res = await fetch(
            "/api/support-chat/thread/" + encodeURIComponent(memberId) + "/" + encodeURIComponent(adminId),
            { credentials: "same-origin", headers: await authHeaders() }
          );
          if (!res.ok) throw new Error("thread");
          const data = await res.json();
          const thread = data.thread || {};
          threadLabel.textContent = (thread.userLabel || "Member") + " → admin " + adminId;
          clearMessages();
          (thread.messages || []).forEach(appendBubble);
          deleteBtn.hidden = false;
          input.disabled = false;
          sendBtn.disabled = false;
          await loadInbox();
        } catch (_e) {
          statusEl.textContent = "Could not load thread.";
        }
      }

      function connectStream() {
        if (es) { es.close(); es = null; }
        ensureApiToken()
          .then((token) => {
            es = new EventSource("/api/support-chat/stream?token=" + encodeURIComponent(token));
            es.onmessage = (ev) => {
              try {
                const data = JSON.parse(ev.data);
                if (data.type === "ready") return;
                if (data.type === "thread_deleted") {
                  const scope = String(data.threadScope || "");
                  const cur =
                    selectedMemberId && selectedAdminId
                      ? selectedMemberId + ":" + selectedAdminId
                      : "";
                  if (scope && cur && scope === cur) adminClearUi();
                  loadInbox();
                  return;
                }
                if (data.type === "message" && data.message) {
                  if (
                    selectedMemberId &&
                    selectedAdminId &&
                    String(data.threadUserId) === String(selectedMemberId) &&
                    String(data.targetAdminId) === String(selectedAdminId)
                  ) {
                    appendBubble(data.message);
                  }
                  loadInbox();
                }
              } catch (_err) { /* ignore */ }
            };
            es.onerror = () => {
              statusEl.textContent = "Live updates disconnected. Refresh to reconnect.";
            };
          })
          .catch(() => { statusEl.textContent = "Could not connect live updates."; });
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text || !selectedMemberId || !selectedAdminId) return;
        sendBtn.disabled = true;
        statusEl.textContent = "";
        try {
          const res = await fetch("/api/support-chat/messages", {
            method: "POST",
            credentials: "same-origin",
            headers: await authHeaders(),
            body: JSON.stringify({
              body: text,
              threadUserId: selectedMemberId,
              targetAdminId: selectedAdminId,
            }),
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            statusEl.textContent = (err && err.detail) ? String(err.detail) : "Send failed.";
            sendBtn.disabled = false;
            return;
          }
          const data = await res.json();
          input.value = "";
          if (data.message) appendBubble(data.message);
          await loadInbox();
        } catch (_e) {
          statusEl.textContent = "Send failed.";
        }
        sendBtn.disabled = false;
      });

      deleteBtn.addEventListener("click", async () => {
        if (!selectedMemberId || !selectedAdminId) return;
        if (!window.confirm("Permanently delete this conversation for everyone?")) return;
        try {
          const res = await fetch(
            "/api/support-chat/thread/" +
              encodeURIComponent(selectedMemberId) +
              "/" +
              encodeURIComponent(selectedAdminId),
            { method: "DELETE", credentials: "same-origin", headers: await authHeaders() }
          );
          if (!res.ok) {
            statusEl.textContent = "Delete failed.";
            return;
          }
          adminClearUi();
          await loadInbox();
        } catch (_e) {
          statusEl.textContent = "Delete failed.";
        }
      });

      adminClearUi();
      loadInbox();
      connectStream();
    }());
  </script>
</body>
</html>
